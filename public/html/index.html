<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="css/home.css" />
    <link rel="stylesheet" href="css/reset.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
    <title>Homepage</title>
  </head>
  <body>
    <div class="wrapper">
      <header class="header">
        <div class="container">
          <div class="header__top">
            <div class="header__flexbox">
              <a href="/">
                <img
                  class="logo"
                  src="../img/barnbridge-bond-logo.svg"
                  alt="Logo"
                />
              </a>
              <nav class="header__nav">
                <a class="nav__item" href="/">About</a>
                <a class="nav__item" href="/">Home</a>
              </nav>
              <img
                class="profile__logo"
                src="../img/profile-svgrepo-com.svg"
                alt="profile__logo"
              />
            </div>
          </div>
        </div>
      </header>
      <main class="main">
        <div class="container">
          <div class="titles__container">
            <p class="title__item">Name</p>
            <p class="title__item">Price</p>
            <p class="title__item">1h %</p>
            <p class="title__item">24h %</p>
            <p class="title__item">Market Cap</p>
            <p class="title__item">Volume (24h)</p>
            <p class="title__item">DEX Liquidity</p>
            <p class="title__item">Age</p>
            <p class="title__item">DEX Txns (24h)</p>
          </div>
          <div class="main__flex"></div>
        </div>
      </main>
    </div>
    <script src="../js/coinList.js" type="module"></script>
  </body>
</html>
